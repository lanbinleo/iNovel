<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>小说写作器</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
<div id="app">
    <!-- 顶部工具栏（同时作为标题栏） -->
    <div class="toolbar" style="--wails-draggable:drag">
        <div class="toolbar-left">
            <button id="toggle-sidebar-btn" class="icon-btn" title="切换侧栏"  style="--wails-draggable:no-drag">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="3" y="3" width="18" height="18" rx="2"/>
                    <line x1="9" y1="3" x2="9" y2="21"/>
                </svg>
            </button>
            <div class="file-info">
                <span id="file-title" class="file-title" style="--wails-draggable:no-drag">未命名文档</span>
                <span id="save-status" class="save-status">·</span>
            </div>
        </div>
        <div class="toolbar-center" style="user-select: none;">
            <span id="word-count" class="word-count">0 字</span>
        </div>
        <div class="toolbar-right">
            <button id="font-size-btn" class="icon-btn" title="字体大小" style="--wails-draggable:no-drag">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M4 7V4h16v3"/>
                    <path d="M9 20h6"/>
                    <path d="M12 4v16"/>
                </svg>
            </button>
            <button id="width-mode-btn" class="icon-btn" title="编辑器宽度" style="--wails-draggable:no-drag">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M21 6H3"/>
                    <path d="M17 12H7"/>
                    <path d="M19 18H5"/>
                </svg>
            </button>
            <button id="theme-toggle-btn" class="icon-btn" title="切换主题" style="--wails-draggable:no-drag">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="12" cy="12" r="5"/>
                    <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                </svg>
            </button>
            <button id="settings-btn" class="icon-btn" title="设置" style="--wails-draggable:no-drag">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
            </button>
            <button id="export-btn" class="icon-btn" title="导出" style="--wails-draggable:no-drag">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
            </button>
            <div class="toolbar-divider"></div>
            <button id="new-file-btn" class="icon-btn" title="新建文档" style="--wails-draggable:no-drag">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="12" y1="18" x2="12" y2="12"/>
                    <line x1="9" y1="15" x2="15" y2="15"/>
                </svg>
            </button>
            <button id="open-file-btn" class="icon-btn" title="打开文件" style="--wails-draggable:no-drag">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                </svg>
            </button>
            <button id="save-btn" class="icon-btn" title="保存 (Ctrl+S)" style="--wails-draggable:no-drag">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                    <polyline points="17 21 17 13 7 13 7 21"/>
                    <polyline points="7 3 7 8 15 8"/>
                </svg>
            </button>
            <div class="toolbar-divider"></div>
            <button id="minimize-btn" class="icon-btn window-btn" title="最小化">
                <svg width="12" height="12" viewBox="0 0 12 12">
                    <rect x="1" y="5.5" width="10" height="1" fill="currentColor"/>
                </svg>
            </button>
            <button id="maximize-btn" class="icon-btn window-btn" title="最大化">
                <svg width="12" height="12" viewBox="0 0 12 12">
                    <rect x="1.5" y="1.5" width="9" height="9" fill="none" stroke="currentColor" stroke-width="1"/>
                </svg>
            </button>
            <button id="close-btn" class="icon-btn window-btn window-btn-close" title="关闭">
                <svg width="12" height="12" viewBox="0 0 12 12">
                    <path d="M1 1L11 11M11 1L1 11" stroke="currentColor" stroke-width="1.2"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- 主内容区 -->
        <div class="main-container">
            <!-- 左侧侧边栏 -->
            <div id="sidebar" class="sidebar">
                <div class="sidebar-section">
                    <div class="sidebar-header">
                        <span class="sidebar-header-title">小说</span>
                        <div class="sidebar-header-actions">
                            <button id="new-novel-btn" class="sidebar-header-btn" title="新建小说">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <path d="M12 5v14M5 12h14"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div id="novel-list" class="sidebar-list">
                        <div class="sidebar-list-empty">暂无小说</div>
                    </div>
                </div>
                <div class="sidebar-section">
                    <div class="sidebar-header">
                        <span class="sidebar-header-title">章节</span>
                        <div class="sidebar-header-actions">
                            <button id="new-chapter-btn" class="sidebar-header-btn" title="新建章节">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <path d="M12 5v14M5 12h14"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div id="chapter-list" class="sidebar-list">
                        <div class="sidebar-list-empty">请选择小说</div>
                    </div>
                </div>
                <div class="workspace-selector">
                    <div class="workspace-actions">
                        <button id="open-workspace-btn" class="workspace-action-btn" title="打开工作空间">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                        </svg>
                    </button>
                    <button id="save-workspace-btn" class="workspace-action-btn" title="保存工作空间">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                            <polyline points="17 21 17 13 7 13 7 21"/>
                            <polyline points="7 3 7 8 15 8"/>
                        </svg>
                    </button>
                    <button id="add-folder-btn" class="workspace-action-btn" title="添加文件夹">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                            <line x1="12" y1="11" x2="12" y2="17"/>
                            <line x1="9" y1="14" x2="15" y2="14"/>
                        </svg>
                    </button>
                </div>
                <span id="workspace-name" class="workspace-name">未命名工作空间</span>
            </div>
            <div class="sidebar-header">
                <span class="sidebar-header-title">文件</span>
                <div class="sidebar-header-actions">
                    <button id="new-folder-btn" class="sidebar-header-btn" title="新建文件夹">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                            <line x1="12" y1="11" x2="12" y2="17"/>
                            <line x1="9" y1="14" x2="15" y2="14"/>
                        </svg>
                    </button>
                    <button id="refresh-tree-btn" class="sidebar-header-btn" title="刷新">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <polyline points="23 4 23 10 17 10"/>
                            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div id="file-tree" class="file-tree">
                <!-- 文件树将在这里动态生成 -->
            </div>
            <!-- 版本信息 -->
            <div class="sidebar-footer">
                <a id="version-link" class="version-info" href="#" title="访问 GitHub">
                    <span id="version-text">v1.0.0</span>
                    <span id="update-badge" class="update-badge hidden">(New Version)</span>
                    <span id="copy-right"> | iNovel By Lanbinleo</span>
                </a>
            </div>
        </div>

        <!-- 编辑区 -->
        <div class="editor-container">
            <div class="chapter-header">
                <input id="chapter-title-input" class="chapter-title-input" type="text" placeholder="请选择章节" disabled />
            </div>
            <div
                id="editor"
                class="editor"
                data-placeholder="开始写作..."
            ></div>
        </div>
    </div>

    <!-- 设置页面 -->
    <div id="settings-page" class="settings-page hidden">
        <div class="settings-panel">
            <div class="settings-header">
                <div class="settings-title">设置</div>
                <button id="settings-close-btn" class="icon-btn settings-close-btn" title="关闭">
                    <svg width="14" height="14" viewBox="0 0 12 12">
                        <path d="M1 1L11 11M11 1L1 11" stroke="currentColor" stroke-width="1.2"/>
                    </svg>
                </button>
            </div>
            <div class="settings-body">
                <div class="settings-section">
                    <div class="settings-section-title">基础</div>
                    <div class="settings-item">
                        <div class="settings-item-label">数据库模式</div>
                        <div class="settings-item-value">单库（library.db）</div>
                    </div>
                    <div class="settings-item">
                        <div class="settings-item-label">主题与宽度</div>
                        <div class="settings-item-value">通过工具栏按钮切换</div>
                    </div>
                </div>
                <div class="settings-section">
                    <div class="settings-section-title">AI</div>
                    <div class="settings-item">
                        <div class="settings-item-label">Provider</div>
                        <div class="settings-item-value">将在此页面配置（Phase 4）</div>
                    </div>
                </div>
                <div class="settings-section">
                    <div class="settings-section-title">导入</div>
                    <div class="settings-item">
                        <div class="settings-item-label">Markdown / TXT</div>
                        <div class="settings-item-value">将在此页面或工具栏提供入口</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 字体大小弹出菜单 -->
<div id="font-size-popup" class="popup hidden">
    <button class="popup-item" data-size="small">小</button>
    <button class="popup-item" data-size="medium">中</button>
    <button class="popup-item" data-size="large">大</button>
</div>

<!-- 导出弹出菜单 -->
<div id="export-popup" class="popup hidden">
    <button class="popup-item" data-export="txt">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
        </svg>
        导出为 TXT
    </button>
    <button class="popup-item" data-export="image">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
        </svg>
        导出为长图
    </button>
</div>

<script src="./src/main.ts" type="module"></script>
</body>
</html>
